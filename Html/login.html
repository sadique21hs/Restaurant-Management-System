<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliciano Restaurant - Log In</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;600;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../CSS/login.css">

</head>
<body>

  <div class="page-wrapper">
    <div class="bg-overlay"></div>
    <div class="top-logo"><a href="../Html/Index.html" aria-label="Go to Home">Feliciano</a></div>
    <div class="left-content">
      <h1 class="hero-headline">
        From<br>
        Kitchen to<br>
        Customer,<br>
        Seamlessly.
      </h1>
    </div>

    <div class="login-card">
      <div class="card-logo">
        <a href="../Html/Index.html" aria-label="Go to Home">
          <img src="../Images/Logo.png" alt="Feliciano Logo" class="card-logo-img">
        </a>
      </div>
      <div class="card-script">Log In</div>
      <p class="card-subtitle">
        Welcome To Feliciano Restaurant<br>
        Enjoy Delicious Food And Great Service.
      </p>
      <form class="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected></option>
            <option value="customer">Customer</option>
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
            <option value="chef">Chef</option>
          </select>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          >
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            >
           
            <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password">
              <i class="fas fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login">Log In</button>
        <div class="signup-row">
          <p>Don't have an account?<br>Create one and enjoy our services.</p>
          <a href="signup.html" class="btn-signup">Sign Up →</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
