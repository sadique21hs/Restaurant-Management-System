<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliciano Restaurant - Sign Up</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;600;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../CSS/signup.css">

</head>
<body>

  <div class="page-wrapper">

    <div class="bg-overlay"></div>

    <div class="top-logo">Feliciano</div>

    <!-- Card is now on the LEFT -->
    <div class="login-card">

      <div class="card-logo">
        <img src="../Images/Login/Logo.png" alt="Feliciano Logo" class="card-logo-img">
      </div>

      <!-- Script heading -->
      <div class="card-script">Sign Up</div>

      <!-- Subtitle -->
      <p class="card-subtitle">
        Join Feliciano Restaurant<br>
        Create An Account And Start Enjoying.
      </p>

      <!-- Sign Up Form -->
      <form class="login-form" onsubmit="handleSignup(event)">

        <!-- Role dropdown -->
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" disabled selected></option>
            <option value="customer">Customer</option>
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
            <option value="chef">Chef</option>
          </select>
        </div>

        <!-- Full Name -->
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Enter your full name"
            required
          >
        </div>

        <!-- Email input -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          >
        </div>

        <!-- Password input -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create a password"
              required
            >
            <button type="button" class="toggle-password" onclick="togglePassword('password', 'eye-icon-1')" aria-label="Toggle password">
              <i class="fas fa-eye" id="eye-icon-1"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Confirm your password"
              required
            >
            <button type="button" class="toggle-password" onclick="togglePassword('confirm-password', 'eye-icon-2')" aria-label="Toggle confirm password">
              <i class="fas fa-eye" id="eye-icon-2"></i>
            </button>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-login">Sign Up</button>

        <!-- Log in link -->
        <div class="signup-row">
          <p>Already have an account?<br>Log in and continue.</p>
          <a href="login.html" class="btn-signup">Log In →</a>
        </div>

      </form>

    </div>

    <!-- Hero text is now on the RIGHT -->
    <div class="right-content ">
      <h1 class="hero-headline">
        Where Culinary<br>
        Delight Meets<br>
        Warm Hospitality.
      </h1>
    </div>

  </div>

 

</body>
</html>
